<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XX-CAKE Web</title>
  <style>
    :root {
      --bg: #16161e;
      --panel: #1e1e2e;
      --panel2: #252535;
      --accent: #89b4fa;
      --accent2: #cba6f7;
      --green: #a6e3a1;
      --red: #f38ba8;
      --yellow: #f9e2af;
      --text: #cdd6f4;
      --text2: #9399b2;
      --border: #313244;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: bold;
      color: var(--accent2);
      letter-spacing: 1px;
    }
    .header-sep { flex: 1; }
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    /* ===== CANVAS AREA ===== */
    .canvas-wrap {
      flex: 1;
      background: #0d0d14;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      position: relative;
    }
    .drop-hint {
      position: absolute;
      text-align: center;
      color: var(--text2);
      pointer-events: none;
      user-select: none;
    }
    .drop-hint .icon { font-size: 48px; margin-bottom: 8px; }
    .drop-hint p { font-size: 15px; }
    #canvas {
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
    }
    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 270px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sidebar-scroll::-webkit-scrollbar { width: 6px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    /* ===== SECTION CARD ===== */
    .card {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .card-title {
      font-size: 11px;
      font-weight: bold;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    /* ===== BUTTONS ===== */
    btn, .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--accent); color: #1e1e2e; font-weight: bold; }
    .btn-danger { background: var(--red); color: #1e1e2e; }
    .btn-success { background: var(--green); color: #1e1e2e; font-weight: bold; }
    .btn-purple { background: var(--accent2); color: #1e1e2e; font-weight: bold; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { background: var(--border); }
    .btn-sm { padding: 3px 8px; font-size: 11px; }
    /* ===== FORM CONTROLS ===== */
    .field { margin-bottom: 6px; }
    .field label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text2);
      margin-bottom: 3px;
      font-size: 11px;
    }
    .field label span { color: var(--accent); font-weight: bold; }
    input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      height: 4px;
      cursor: pointer;
    }
    select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
    }
    /* ===== LAYER LIST ===== */
    .layer-list { display: flex; flex-direction: column; gap: 5px; }
    .layer-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 6px 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .layer-item.selected { border-color: var(--accent); }
    .layer-item.shake-active { border-color: var(--yellow) !important; }
    .layer-item-top {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .layer-color {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .layer-name {
      flex: 1;
      font-size: 12px;
    }
    .layer-actions { display: flex; gap: 3px; }
    .layer-params {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
    }
    .layer-param-mini {
      background: var(--panel);
      border-radius: 3px;
      padding: 3px 5px;
      font-size: 10px;
      text-align: center;
    }
    .layer-param-mini .lp-label { color: var(--text2); }
    .layer-param-mini .lp-val { color: var(--accent); font-weight: bold; }
    /* ===== STATUS BAR ===== */
    .statusbar {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 3px 12px;
      font-size: 11px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
    }
    .status-dot.recording { background: var(--red); animation: blink 0.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    /* ===== TOGGLE ===== */
    .toggle-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 2px;
      color: var(--text2);
      line-height: 1;
    }
    .toggle-btn.on { color: var(--green); }
    /* ===== ROW UTIL ===== */
    .row { display: flex; gap: 5px; align-items: center; }
    .row.wrap { flex-wrap: wrap; }
    .row.between { justify-content: space-between; }
    .row.center { justify-content: center; }
    /* ===== RECORDING OVERLAY ===== */
    .rec-badge {
      position: fixed; top: 50px; left: 50%;
      transform: translateX(-50%);
      background: var(--red);
      color: white;
      font-weight: bold;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      display: none;
      z-index: 100;
      animation: blink 0.8s infinite;
    }
    .rec-badge.visible { display: block; }
  </style>
</head>
<body>

<header>
  <h1>🍰 XX-CAKE Web</h1>
  <button class="btn btn-ghost" onclick="document.getElementById('fileInput').click()">
    📂 画像を開く
  </button>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <div class="header-sep"></div>
  <span style="color:var(--text2);font-size:11px">モード: </span>
  <select id="modeSelect" style="width:auto">
    <option value="draw">🖊 レイヤー追加</option>
    <option value="move">✋ 移動</option>
  </select>
</header>

<div class="rec-badge" id="recBadge">● REC</div>

<div class="main">
  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvasWrap">
    <div class="drop-hint" id="dropHint">
      <div class="icon">🖼️</div>
      <p>画像をドラッグ＆ドロップ<br>またはヘッダーから開く</p>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-scroll">

      <!-- SHAKE CONTROLS -->
      <div class="card">
        <div class="card-title">⚡ シェイク</div>
        <div class="field">
          <label>強さ <span id="shakeStrVal">15</span></label>
          <input type="range" id="shakeStr" min="1" max="60" value="15">
        </div>
        <div class="row wrap" style="gap:5px;margin-top:4px">
          <button class="btn btn-primary" style="flex:1" onclick="shakeAll()">🌀 シェイク!</button>
          <button class="btn btn-ghost" style="flex:1" onclick="resetAll()">⬛ リセット</button>
        </div>
        <div style="margin-top:8px;color:var(--text2);font-size:11px">
          💡 キャンバスをクリックでもシェイク
        </div>
      </div>

      <!-- GLOBAL PHYSICS -->
      <div class="card">
        <div class="card-title">⚙ グローバル物理設定</div>
        <div class="field">
          <label>質量 (重さ) <span id="gMassVal">5.0</span></label>
          <input type="range" id="gMass" min="0.5" max="20" step="0.5" value="5">
        </div>
        <div class="field">
          <label>弾力 (ばね) <span id="gSpringVal">120</span></label>
          <input type="range" id="gSpring" min="10" max="500" step="10" value="120">
        </div>
        <div class="field">
          <label>減衰 <span id="gDampVal">8</span></label>
          <input type="range" id="gDamp" min="1" max="30" step="1" value="8">
        </div>
        <button class="btn btn-ghost btn-sm" style="width:100%" onclick="applyGlobalToAll()">全レイヤーに適用</button>
      </div>

      <!-- LAYERS -->
      <div class="card">
        <div class="card-title row between">
          <span>📦 レイヤー</span>
          <span id="layerCount" style="color:var(--accent);font-size:11px">0 個</span>
        </div>
        <div class="layer-list" id="layerList">
          <div style="color:var(--text2);font-size:11px;text-align:center;padding:8px">
            ドラッグして領域を作成
          </div>
        </div>
      </div>

      <!-- SELECTED LAYER SETTINGS -->
      <div class="card" id="selectedCard" style="display:none">
        <div class="card-title">✏ 選択レイヤー設定</div>
        <div id="selectedName" style="font-size:12px;color:var(--accent2);margin-bottom:8px">Layer 1</div>
        <div class="field">
          <label>質量 <span id="sMassVal">5.0</span></label>
          <input type="range" id="sMass" min="0.5" max="20" step="0.5" value="5">
        </div>
        <div class="field">
          <label>弾力 <span id="sSpringVal">120</span></label>
          <input type="range" id="sSpring" min="10" max="500" step="10" value="120">
        </div>
        <div class="field">
          <label>減衰 <span id="sDampVal">8</span></label>
          <input type="range" id="sDamp" min="1" max="30" step="1" value="8">
        </div>
        <div class="field">
          <label>シェイク倍率 <span id="sMultVal">1.0</span></label>
          <input type="range" id="sMult" min="0.1" max="3" step="0.1" value="1">
        </div>
        <div class="row" style="margin-top:6px;gap:5px">
          <button class="btn btn-danger btn-sm" style="flex:1" onclick="deleteSelected()">🗑 削除</button>
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="duplicateSelected()">⧉ 複製</button>
        </div>
      </div>

      <!-- GIF EXPORT -->
      <div class="card">
        <div class="card-title">🎬 録画 / 書き出し</div>
        <div class="field">
          <label>録画秒数 <span id="recDurVal">3</span>s</label>
          <input type="range" id="recDur" min="1" max="10" step="1" value="3">
        </div>
        <div class="field">
          <label>GIF FPS</label>
          <select id="gifFps">
            <option value="15" selected>15 FPS</option>
            <option value="12">12 FPS</option>
            <option value="10">10 FPS</option>
          </select>
        </div>
        <div class="field">
          <label>品質 (低 = 高品質)</label>
          <select id="gifQuality">
            <option value="5">高品質 (遅い)</option>
            <option value="10" selected>標準</option>
            <option value="20">低品質 (速い)</option>
          </select>
        </div>
        <div class="row" style="gap:5px;margin-top:6px">
          <button class="btn btn-success" id="btnRecGif" style="flex:1" onclick="recordGif()">
            🎞 GIF録画
          </button>
          <button class="btn btn-purple" id="btnRecWebm" style="flex:1" onclick="recordWebM()">
            🎥 WebM録画
          </button>
        </div>
        <div id="exportProgress" style="display:none;margin-top:8px;font-size:11px;color:var(--yellow)">
          ⏳ エンコード中...
        </div>
      </div>

    </div>
  </div>
</div>

<div class="statusbar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">画像を読み込んでください</span>
  <div style="flex:1"></div>
  <span id="statusInfo" style="color:var(--accent);font-size:11px"></span>
</div>

<!-- gif.js from CDN -->

<script>
'use strict';

// ===== STATE =====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let img = null;
let layers = [];
let selectedLayer = null;
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragRect = null;
let mode = 'draw'; // 'draw' | 'move'
let movingLayer = null;
let moveOffset = { x: 0, y: 0 };
let lastTime = 0;
let rafId = null;
let recording = false;
let gifFrames = [];
let mediaRecorder = null;
let layerCounter = 0;
let hoverLayer = null;

const COLORS = ['#89b4fa','#cba6f7','#a6e3a1','#f9e2af','#f38ba8','#fab387','#74c7ec','#94e2d5'];

// ===== SPRING PHYSICS =====
class Spring {
  constructor(mass=5, spring=120, damping=8) {
    this.mass = mass;
    this.spring = spring;
    this.damping = damping;
    this.x = 0; this.y = 0;
    this.vx = 0; this.vy = 0;
  }
  impulse(strength, mult=1) {
    const angle = Math.random() * Math.PI * 2;
    const s = strength * mult;
    this.vx += Math.cos(angle) * s;
    this.vy += Math.sin(angle) * s;
  }
  update(dt) {
    const ax = (-this.spring * this.x - this.damping * this.vx) / this.mass;
    const ay = (-this.spring * this.y - this.damping * this.vy) / this.mass;
    this.vx += ax * dt;
    this.vy += ay * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }
  get energy() {
    return Math.abs(this.vx) + Math.abs(this.vy) + Math.abs(this.x) + Math.abs(this.y);
  }
  reset() { this.x=this.y=this.vx=this.vy=0; }
}

// ===== LAYER =====
class Layer {
  constructor(x, y, w, h) {
    layerCounter++;
    this.id = layerCounter;
    this.name = `Layer ${layerCounter}`;
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.spring = new Spring(
      parseFloat(document.getElementById('gMass').value),
      parseFloat(document.getElementById('gSpring').value),
      parseFloat(document.getElementById('gDamp').value)
    );
    this.mult = 1.0;
    this.enabled = true;
    this.color = COLORS[(layerCounter - 1) % COLORS.length];
  }
}

// ===== IMAGE LOAD =====
function loadImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  const i = new Image();
  i.onload = () => {
    img = i;
    canvas.width = i.width;
    canvas.height = i.height;
    document.getElementById('dropHint').style.display = 'none';
    setStatus(`✅ 画像読み込み完了: ${i.width}×${i.height}`);
    document.getElementById('statusInfo').textContent = `${i.width}×${i.height}px`;
    URL.revokeObjectURL(url);
    render();
  };
  i.src = url;
}

document.getElementById('fileInput').onchange = e => loadImageFile(e.target.files[0]);

// Drag & Drop on canvas wrap
const wrap = document.getElementById('canvasWrap');
wrap.addEventListener('dragover', e => { e.preventDefault(); wrap.style.outline = '2px dashed var(--accent)'; });
wrap.addEventListener('dragleave', () => { wrap.style.outline = ''; });
wrap.addEventListener('drop', e => {
  e.preventDefault();
  wrap.style.outline = '';
  const f = e.dataTransfer.files[0];
  if (f) loadImageFile(f);
});

// ===== CANVAS MOUSE =====
function canvasPos(e) {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width;
  const sy = canvas.height / r.height;
  return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
}

function getLayerAt(x, y) {
  for (let i = layers.length - 1; i >= 0; i--) {
    const l = layers[i];
    if (!l.enabled) continue;
    const ox = l.spring.x, oy = l.spring.y;
    if (x >= l.x + ox && x <= l.x + ox + l.w && y >= l.y + oy && y <= l.y + oy + l.h) return l;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  if (!img) return;
  const p = canvasPos(e);
  mode = document.getElementById('modeSelect').value;

  if (mode === 'move') {
    const l = getLayerAt(p.x, p.y);
    if (l) {
      movingLayer = l;
      moveOffset = { x: p.x - l.x, y: p.y - l.y };
      selectLayer(l);
    } else {
      shakeAll();
    }
  } else {
    // draw mode
    isDragging = true;
    dragStart = p;
    dragRect = { x: p.x, y: p.y, w: 0, h: 0 };
  }
});

canvas.addEventListener('mousemove', e => {
  if (!img) return;
  const p = canvasPos(e);
  mode = document.getElementById('modeSelect').value;

  if (movingLayer) {
    movingLayer.x = p.x - moveOffset.x;
    movingLayer.y = p.y - moveOffset.y;
    movingLayer.x = Math.max(0, Math.min(canvas.width - movingLayer.w, movingLayer.x));
    movingLayer.y = Math.max(0, Math.min(canvas.height - movingLayer.h, movingLayer.y));
    return;
  }

  if (isDragging) {
    dragRect = {
      x: Math.min(dragStart.x, p.x),
      y: Math.min(dragStart.y, p.y),
      w: Math.abs(p.x - dragStart.x),
      h: Math.abs(p.y - dragStart.y)
    };
  } else {
    hoverLayer = mode === 'move' ? getLayerAt(p.x, p.y) : null;
    canvas.style.cursor = (mode === 'move' && hoverLayer) ? 'grab' : (mode === 'move' ? 'default' : 'crosshair');
  }
});

canvas.addEventListener('mouseup', e => {
  if (!img) return;
  const p = canvasPos(e);

  if (movingLayer) {
    movingLayer = null;
    return;
  }

  if (isDragging) {
    isDragging = false;
    if (dragRect && dragRect.w > 10 && dragRect.h > 10) {
      const l = new Layer(
        Math.round(dragRect.x), Math.round(dragRect.y),
        Math.round(dragRect.w), Math.round(dragRect.h)
      );
      layers.push(l);
      selectLayer(l);
      updateLayerList();
      setStatus(`✅ ${l.name} を追加 (${l.w}×${l.h}px)`);
    }
    dragRect = null;
  } else if (mode === 'draw') {
    shakeAll();
  }
});

canvas.addEventListener('mouseleave', () => {
  if (isDragging) { isDragging = false; dragRect = null; }
  movingLayer = null;
  hoverLayer = null;
});

// Click in draw mode (no drag) → shake
canvas.addEventListener('click', e => {
  if (!img || layers.length === 0) return;
});

// ===== RENDER =====
function render() {
  if (!img) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);

  // Draw each layer region with offset
  for (const l of layers) {
    if (!l.enabled) continue;
    const ox = Math.round(l.spring.x);
    const oy = Math.round(l.spring.y);
    ctx.save();
    ctx.drawImage(img, l.x, l.y, l.w, l.h, l.x + ox, l.y + oy, l.w, l.h);
    ctx.restore();
  }

  // Draw layer borders in non-recording mode
  if (!recording) {
    for (const l of layers) {
      const ox = Math.round(l.spring.x);
      const oy = Math.round(l.spring.y);
      ctx.save();
      ctx.strokeStyle = l.color;
      ctx.lineWidth = (l === selectedLayer) ? 2 : 1;
      ctx.globalAlpha = (l === selectedLayer || l === hoverLayer) ? 1 : 0.5;
      ctx.setLineDash(l === selectedLayer ? [] : [4, 3]);
      ctx.strokeRect(l.x + ox + 0.5, l.y + oy + 0.5, l.w - 1, l.h - 1);
      if (!recording) {
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = l.color;
        ctx.font = 'bold 11px Segoe UI, sans-serif';
        ctx.fillText(l.name, l.x + ox + 4, l.y + oy + 13);
      }
      ctx.restore();
    }

    // Draw drag rect
    if (isDragging && dragRect && dragRect.w > 2) {
      ctx.save();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 3]);
      ctx.strokeRect(dragRect.x, dragRect.y, dragRect.w, dragRect.h);
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fillRect(dragRect.x, dragRect.y, dragRect.w, dragRect.h);
      ctx.restore();
    }
  }
}

// ===== ANIMATION LOOP =====
function animate(timestamp) {
  rafId = requestAnimationFrame(animate);
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (img) {
    let anyActive = false;
    for (const l of layers) {
      if (!l.enabled) continue;
      l.spring.update(dt);
      if (l.spring.energy > 0.05) anyActive = true;
    }
    render();

    // Update layer item activity indicators
    for (const l of layers) {
      const el = document.getElementById(`layer-${l.id}`);
      if (el) el.classList.toggle('shake-active', l.spring.energy > 0.5);
    }
  }
}
requestAnimationFrame(t => { lastTime = t; animate(t); });

// ===== SHAKE =====
function shakeAll() {
  if (!img) return;
  const str = parseFloat(document.getElementById('shakeStr').value);
  for (const l of layers) {
    if (l.enabled) l.spring.impulse(str, l.mult);
  }
}

function resetAll() {
  for (const l of layers) l.spring.reset();
}

// ===== LAYER MANAGEMENT =====
function selectLayer(l) {
  selectedLayer = l;
  updateLayerList();
  updateSelectedCard();
}

function deleteSelected() {
  if (!selectedLayer) return;
  layers = layers.filter(l => l !== selectedLayer);
  selectedLayer = null;
  updateLayerList();
  updateSelectedCard();
  setStatus('レイヤーを削除しました');
}

function duplicateSelected() {
  if (!selectedLayer) return;
  const src = selectedLayer;
  const l = new Layer(src.x + 10, src.y + 10, src.w, src.h);
  l.spring.mass = src.spring.mass;
  l.spring.spring = src.spring.spring;
  l.spring.damping = src.spring.damping;
  l.mult = src.mult;
  layers.push(l);
  selectLayer(l);
  updateLayerList();
  setStatus(`${l.name} を複製しました`);
}

function applyGlobalToAll() {
  const mass = parseFloat(document.getElementById('gMass').value);
  const spring = parseFloat(document.getElementById('gSpring').value);
  const damp = parseFloat(document.getElementById('gDamp').value);
  for (const l of layers) {
    l.spring.mass = mass;
    l.spring.spring = spring;
    l.spring.damping = damp;
  }
  if (selectedLayer) updateSelectedCard();
  setStatus('全レイヤーに適用しました');
}

function updateLayerList() {
  const el = document.getElementById('layerList');
  document.getElementById('layerCount').textContent = `${layers.length} 個`;

  if (layers.length === 0) {
    el.innerHTML = '<div style="color:var(--text2);font-size:11px;text-align:center;padding:8px">ドラッグして領域を作成</div>';
    return;
  }

  el.innerHTML = '';
  for (let i = layers.length - 1; i >= 0; i--) {
    const l = layers[i];
    const item = document.createElement('div');
    item.className = 'layer-item' + (l === selectedLayer ? ' selected' : '');
    item.id = `layer-${l.id}`;
    item.innerHTML = `
      <div class="layer-item-top">
        <div class="layer-color" style="background:${l.color}"></div>
        <div class="layer-name">${l.name}</div>
        <div class="layer-actions">
          <button class="toggle-btn ${l.enabled ? 'on' : ''}" title="${l.enabled ? '非表示' : '表示'}" onclick="toggleLayer(${l.id},event)">
            ${l.enabled ? '👁' : '🚫'}
          </button>
        </div>
      </div>
      <div class="layer-params">
        <div class="layer-param-mini">
          <div class="lp-label">質量</div>
          <div class="lp-val">${l.spring.mass.toFixed(1)}</div>
        </div>
        <div class="layer-param-mini">
          <div class="lp-label">弾力</div>
          <div class="lp-val">${l.spring.spring}</div>
        </div>
        <div class="layer-param-mini">
          <div class="lp-label">倍率</div>
          <div class="lp-val">×${l.mult.toFixed(1)}</div>
        </div>
      </div>
    `;
    item.addEventListener('click', () => selectLayer(l));
    el.appendChild(item);
  }
}

function toggleLayer(id, e) {
  e.stopPropagation();
  const l = layers.find(l => l.id === id);
  if (l) {
    l.enabled = !l.enabled;
    if (!l.enabled) l.spring.reset();
    updateLayerList();
  }
}

function updateSelectedCard() {
  const card = document.getElementById('selectedCard');
  if (!selectedLayer) { card.style.display = 'none'; return; }
  card.style.display = '';
  document.getElementById('selectedName').textContent = selectedLayer.name;
  document.getElementById('sMass').value = selectedLayer.spring.mass;
  document.getElementById('sMassVal').textContent = selectedLayer.spring.mass.toFixed(1);
  document.getElementById('sSpring').value = selectedLayer.spring.spring;
  document.getElementById('sSpringVal').textContent = selectedLayer.spring.spring;
  document.getElementById('sDamp').value = selectedLayer.spring.damping;
  document.getElementById('sDampVal').textContent = selectedLayer.spring.damping;
  document.getElementById('sMult').value = selectedLayer.mult;
  document.getElementById('sMultVal').textContent = selectedLayer.mult.toFixed(1);
}

// ===== SLIDER BINDINGS =====
function bindSlider(id, valId, dec=0, onChange) {
  const el = document.getElementById(id);
  const vEl = document.getElementById(valId);
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    vEl.textContent = dec > 0 ? v.toFixed(dec) : v;
    if (onChange) onChange(v);
  });
}

bindSlider('shakeStr', 'shakeStrVal');
bindSlider('gMass', 'gMassVal', 1);
bindSlider('gSpring', 'gSpringVal');
bindSlider('gDamp', 'gDampVal');
bindSlider('recDur', 'recDurVal');
bindSlider('sMass', 'sMassVal', 1, v => { if (selectedLayer) { selectedLayer.spring.mass = v; updateLayerList(); } });
bindSlider('sSpring', 'sSpringVal', 0, v => { if (selectedLayer) { selectedLayer.spring.spring = v; updateLayerList(); } });
bindSlider('sDamp', 'sDampVal', 0, v => { if (selectedLayer) { selectedLayer.spring.damping = v; updateLayerList(); } });

      recording = false;

      setStatus('⏳ GIFエンコード中...');
      document.getElementById('exportProgress').style.display = '';

      gif.on('finished', blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `xx-cake-${Date.now()}.gif`;
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById('exportProgress').style.display = 'none';
        document.getElementById('btnRecGif').disabled = false;
        document.getElementById('btnRecWebm').disabled = false;
        setStatus(`✅ GIF保存完了 (${(blob.size/1024).toFixed(0)}KB)`);
      });
      gif.render();
      return;
    }

    elapsed += delay;

    // Re-shake occasionally
    if (elapsed > 0 && elapsed % 1500 < delay) shakeAll();

    setTimeout(captureFrame, delay);
  };

  setTimeout(captureFrame, 100);

// ===== WebM RECORDING =====
function recordWebM() {
  if (!img) { alert('画像を読み込んでください'); return; }
  if (recording) return;
  if (!canvas.captureStream) { alert('このブラウザはWebM録画に対応していません'); return; }

  const dur = parseInt(document.getElementById('recDur').value) * 1000;
  const stream = canvas.captureStream(30);
  const chunks = [];

  const mime = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']
    .find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';

  mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks, { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `xx-cake-${Date.now()}.webm`;
    a.click();
    URL.revokeObjectURL(url);
    recording = false;
    document.getElementById('recBadge').classList.remove('visible');
    document.getElementById('btnRecGif').disabled = false;
    document.getElementById('btnRecWebm').disabled = false;
    setStatus(`✅ WebM保存完了 (${(blob.size/1024).toFixed(0)}KB)`);
  };

  recording = true;
  setStatus('🔴 WebM録画中...', true);
  document.getElementById('recBadge').classList.add('visible');
  document.getElementById('btnRecGif').disabled = true;
  document.getElementById('btnRecWebm').disabled = true;

  mediaRecorder.start(100);
  shakeAll();

  // Re-shake midway
  setTimeout(() => { if (recording) shakeAll(); }, dur * 0.4);

  setTimeout(() => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    stream.getTracks().forEach(t => t.stop());
  }, dur);
}

// ===== STATUS =====
function setStatus(msg, recording=false) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('statusDot').className = 'status-dot' + (recording ? ' recording' : '');
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); shakeAll(); }
  if (e.code === 'KeyR') resetAll();
  if (e.code === 'Delete' || e.code === 'Backspace') deleteSelected();
  if (e.code === 'KeyM') document.getElementById('modeSelect').value = mode === 'draw' ? 'move' : 'draw';
});

setStatus('画像を読み込んでください');
</script>
