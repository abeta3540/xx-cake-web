<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XX-CAKE Web</title>
  <style>
    :root {
      --bg:#16161e;--panel:#1e1e2e;--panel2:#252535;
      --accent:#89b4fa;--accent2:#cba6f7;
      --green:#a6e3a1;--red:#f38ba8;--yellow:#f9e2af;
      --text:#cdd6f4;--text2:#9399b2;--border:#313244;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Meiryo',sans-serif;font-size:13px;display:flex;flex-direction:column}
    header{background:var(--panel);border-bottom:1px solid var(--border);padding:5px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
    header h1{font-size:14px;font-weight:bold;color:var(--accent2);letter-spacing:1px;white-space:nowrap}
    .vsep{width:1px;height:18px;background:var(--border);flex-shrink:0}
    .hgap{flex:1;min-width:4px}
    .zoom-group{display:flex;align-items:center;gap:2px;background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:2px 4px}
    #zoomLabel{min-width:38px;text-align:center;font-size:11px;color:var(--accent);font-weight:bold}
    .main{flex:1;display:flex;overflow:hidden}
    .canvas-wrap{flex:1;background:#080810;overflow:hidden;position:relative}
    .canvas-wrap.pan-ready,.canvas-wrap.pan-ready *{cursor:grab!important}
    .canvas-wrap.panning,.canvas-wrap.panning *{cursor:grabbing!important}
    .drop-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--text2);pointer-events:none;user-select:none}
    .drop-hint .icon{font-size:48px;margin-bottom:8px}
    .drop-hint p{font-size:14px;line-height:1.6}
    #canvasInner{position:absolute;top:0;left:0;transform-origin:0 0}
    #canvas{display:block}
    #overlay{position:absolute;top:0;left:0;pointer-events:none}
    .sidebar{width:260px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
    .sidebar-scroll{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
    .sidebar-scroll::-webkit-scrollbar{width:5px}
    .sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .card{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
    .card-title{font-size:10px;font-weight:bold;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:5px 9px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-family:inherit;transition:opacity .12s,transform .08s;user-select:none;white-space:nowrap}
    .btn:active{transform:scale(.96)}
    .btn:disabled{opacity:.4;cursor:default}
    .btn-primary{background:var(--accent);color:#1e1e2e;font-weight:bold}
    .btn-success{background:var(--green);color:#1e1e2e;font-weight:bold}
    .btn-purple{background:var(--accent2);color:#1e1e2e;font-weight:bold}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-ghost:hover{background:var(--border)}
    .btn-ghost.active{background:var(--border);border-color:var(--accent);color:var(--accent)}
    .btn-sm{padding:3px 7px;font-size:11px}
    .btn-icon{padding:3px 6px;font-size:13px}
    .field{margin-bottom:5px}
    .field label{display:flex;justify-content:space-between;align-items:center;color:var(--text2);margin-bottom:2px;font-size:11px}
    .field label span{color:var(--accent);font-weight:bold}
    input[type=range]{width:100%;accent-color:var(--accent);height:4px;cursor:pointer}
    input[type=number]{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;font-family:inherit;width:100%}
    input[type=color]{width:30px;height:22px;border:1px solid var(--border);border-radius:3px;cursor:pointer;padding:1px;background:var(--bg)}
    select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;cursor:pointer;width:100%}
    .paint-modes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:7px}
    .mode-btn{padding:5px 4px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-size:11px;text-align:center;user-select:none;transition:all .12s}
    .mode-btn.active-activate{border-color:var(--accent);color:var(--accent);background:rgba(137,180,250,.12)}
    .mode-btn.active-erase{border-color:var(--red);color:var(--red);background:rgba(243,139,168,.12)}
    .mode-btn.active-fixed{border-color:var(--yellow);color:var(--yellow);background:rgba(249,226,175,.12)}
    .osc-types{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
    .osc-btn{flex:1;min-width:38px;padding:4px 3px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;font-size:11px;text-align:center;user-select:none;transition:all .12s}
    .osc-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(203,166,247,.12)}
    .size-row{display:flex;align-items:center;gap:4px}
    .size-row input{flex:1}
    .size-sep{color:var(--text2);font-size:11px;flex-shrink:0}
    .statusbar{background:var(--panel);border-top:1px solid var(--border);padding:3px 10px;font-size:11px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-shrink:0}
    .status-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
    .status-dot.recording{background:var(--red);animation:blink .8s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .rec-badge{position:fixed;top:48px;left:50%;transform:translateX(-50%);background:var(--red);color:white;font-weight:bold;padding:5px 14px;border-radius:20px;font-size:12px;display:none;z-index:100;animation:blink .8s infinite}
    .rec-badge.visible{display:block}
    .row{display:flex;gap:4px;align-items:center}
    .row.between{justify-content:space-between}
    .info-badge{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:2px 6px;font-size:11px;color:var(--accent);font-weight:bold}
  </style>
</head>
<body>

<header>
  <h1>🍰 XX-CAKE Web</h1>
  <button class="btn btn-ghost btn-sm" onclick="document.getElementById('fileInput').click()">📂 画像を開く</button>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <div class="vsep"></div>
  <div class="zoom-group">
    <button class="btn btn-ghost btn-icon" onclick="zoomStep(1/1.2)">−</button>
    <span id="zoomLabel">100%</span>
    <button class="btn btn-ghost btn-icon" onclick="zoomStep(1.2)">+</button>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="fitToScreen()">⊞ Fit</button>
  <button class="btn btn-ghost btn-sm" onclick="resetView()">1:1</button>
  <div class="vsep"></div>
  <span style="font-size:11px;color:var(--text2)">ペイント:</span>
  <button class="btn btn-ghost btn-sm" id="hdrActivate" onclick="setPaintMode('activate')">✓ 有効</button>
  <button class="btn btn-ghost btn-sm" id="hdrErase" onclick="setPaintMode('erase')">✗ 消去</button>
  <button class="btn btn-ghost btn-sm" id="hdrFixed" onclick="setPaintMode('fixed')">📌 固定</button>
</header>

<div class="rec-badge" id="recBadge">● REC</div>

<div class="main">
  <div class="canvas-wrap" id="canvasWrap">
    <div class="drop-hint" id="dropHint">
      <div class="icon">🖼️</div>
      <p>画像をドラッグ＆ドロップ<br>またはヘッダーから開く</p>
    </div>
    <div id="canvasInner">
      <canvas id="canvas"></canvas>
      <canvas id="overlay"></canvas>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-scroll">

      <div class="card">
        <div class="card-title">⊞ グリッド設定</div>
        <div class="field">
          <label>セルサイズ <span id="gridSizeVal">10</span>px</label>
          <input type="range" id="gridSizeSlider" min="4" max="60" step="2" value="10">
        </div>
        <div class="row between" style="margin-bottom:5px">
          <span style="font-size:11px;color:var(--text2)" id="cellInfo">— セル</span>
          <span class="info-badge" id="activeCount">0 有効</span>
        </div>
        <div class="row" style="gap:4px">
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="selectAll()">全選択</button>
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="clearAll()">全クリア</button>
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="invertAll()">反転</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🖊 ペイントモード</div>
        <div class="paint-modes">
          <button class="mode-btn" id="modeActivate" onclick="setPaintMode('activate')">✓ 有効化</button>
          <button class="mode-btn" id="modeErase" onclick="setPaintMode('erase')">✗ 消去</button>
          <button class="mode-btn" id="modeFixed" onclick="setPaintMode('fixed')">📌 固定点</button>
        </div>
        <div style="font-size:10px;color:var(--text2);margin-bottom:7px">
          左ドラッグ: 塗る &nbsp;|&nbsp; 右クリック: 消去<br>
          Ctrl+左: 固定点 &nbsp;|&nbsp; Alt+ドラッグ: パン
        </div>
        <div class="field">
          <label>ブラシ径 <span id="brushSizeVal">1</span>セル</label>
          <input type="range" id="brushSize" min="1" max="15" step="1" value="1">
        </div>
        <div style="color:var(--text2);font-size:10px;margin-bottom:5px">物理デフォルト値</div>
        <div class="field">
          <label>K 弾力 <span id="globalKVal">200</span></label>
          <input type="range" id="globalK" min="10" max="800" step="10" value="200">
        </div>
        <div class="field">
          <label>M 質量 <span id="globalMVal">5.0</span></label>
          <input type="range" id="globalM" min="0.5" max="30" step="0.5" value="5">
        </div>
        <div class="field">
          <label>減衰 <span id="globalDampVal">5</span></label>
          <input type="range" id="globalDamp" min="0.5" max="40" step="0.5" value="5">
        </div>
        <button class="btn btn-ghost btn-sm" style="width:100%" onclick="applyParamsToAll()">全セルに適用</button>
      </div>

      <div class="card">
        <div class="card-title">🌀 振動</div>
        <div class="row" style="gap:4px;margin-bottom:7px">
          <button class="btn btn-ghost btn-sm" id="btnModeManual" style="flex:1" onclick="setOscMode('manual')">手動</button>
          <button class="btn btn-ghost btn-sm" id="btnModeAuto" style="flex:1" onclick="setOscMode('auto')">自動</button>
        </div>
        <div class="osc-types">
          <button class="osc-btn" id="oscRandom" onclick="setOscType('random')">乱↯</button>
          <button class="osc-btn" id="oscVertical" onclick="setOscType('vertical')">縦↕</button>
          <button class="osc-btn" id="oscHorizontal" onclick="setOscType('horizontal')">横↔</button>
          <button class="osc-btn" id="oscCircular" onclick="setOscType('circular')">円⊙</button>
        </div>
        <div class="field">
          <label>強さ <span id="shakeStrVal">90</span></label>
          <input type="range" id="shakeStr" min="1" max="300" step="1" value="90">
        </div>
        <div class="field" id="freqField">
          <label>速さ <span id="oscFreqVal">1.5</span> Hz</label>
          <input type="range" id="oscFreq" min="0.2" max="8" step="0.1" value="1.5">
        </div>
        <div class="row" style="gap:4px;margin-top:4px">
          <button class="btn btn-primary" style="flex:1" onclick="shakeAll()">🌀 シェイク!</button>
          <button class="btn btn-ghost" style="flex:1" onclick="resetAll()">⬛ リセット</button>
        </div>
        <div style="margin-top:6px;font-size:10px;color:var(--text2)">Space: シェイク &nbsp;|&nbsp; R: リセット</div>
      </div>

      <div class="card">
        <div class="card-title">🎨 背景</div>
        <div class="row between">
          <span style="font-size:11px;color:var(--text2)">背景色</span>
          <div class="row" style="gap:4px">
            <input type="color" id="bgColorPicker" value="#16161e" oninput="setBgColor(this.value)">
            <button class="btn btn-ghost btn-sm" onclick="setBgColor('#000000')">黒</button>
            <button class="btn btn-ghost btn-sm" onclick="setBgColor('#ffffff')">白</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📐 エクスポートサイズ</div>
        <div class="field">
          <label>プリセット</label>
          <select id="exportPreset" onchange="onExportPresetChange()">
            <option value="original">オリジナル</option>
            <option value="half">1/2</option>
            <option value="quarter">1/4</option>
            <option value="custom">カスタム</option>
          </select>
        </div>
        <div id="customSizeArea" style="display:none;margin-bottom:5px">
          <div class="size-row">
            <input type="number" id="exportW" placeholder="幅" min="1" max="4096">
            <span class="size-sep">×</span>
            <input type="number" id="exportH" placeholder="高さ" min="1" max="4096">
            <span class="size-sep">px</span>
          </div>
        </div>
        <div id="exportSizePreview" style="color:var(--accent);font-size:11px;text-align:center;font-weight:bold">出力: —</div>
      </div>

      <div class="card">
        <div class="card-title">🎬 録画 / 書き出し</div>
        <div class="field">
          <label>録画時間 <span id="recDurVal">3</span>s</label>
          <input type="range" id="recDur" min="1" max="15" step="1" value="3">
        </div>
        <div class="field">
          <label>GIF FPS</label>
          <select id="gifFps">
            <option value="15" selected>15 FPS</option>
            <option value="12">12 FPS</option>
            <option value="10">10 FPS</option>
          </select>
        </div>
        <div class="field">
          <label>GIF品質</label>
          <select id="gifQuality">
            <option value="5">高品質 (遅い)</option>
            <option value="10" selected>標準</option>
            <option value="20">低品質 (速い)</option>
          </select>
        </div>
        <div class="row" style="gap:4px;margin-top:5px">
          <button class="btn btn-success" id="btnRecGif" style="flex:1" onclick="recordGif()">🎞 GIF</button>
          <button class="btn btn-purple" id="btnRecWebm" style="flex:1" onclick="recordWebM()">🎥 WebM</button>
        </div>
        <div id="exportProgress" style="display:none;margin-top:6px;font-size:11px;color:var(--yellow)">⏳ エンコード中...</div>
      </div>

    </div>
  </div>
</div>

<div class="statusbar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">画像を読み込んでください</span>
  <div style="flex:1"></div>
  <span id="statusZoom" style="color:var(--text2)">Zoom: 100%</span>
  <span style="color:var(--border)">|</span>
  <span id="statusInfo" style="color:var(--accent)"></span>
</div>

<script>

<script>
'use strict';

// ====================================================
// WEBGL MESH RENDERER
// ====================================================
const canvas = document.getElementById('canvas');
const overlay = document.getElementById('overlay');
const oc = overlay.getContext('2d');
const canvasInner = document.getElementById('canvasInner');
const wrap = document.getElementById('canvasWrap');

let gl = canvas.getContext('webgl2');
const isWebGL2 = !!gl;
if (!gl) {
  gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (gl) gl.getExtension('OES_element_index_uint');
}
if (!gl) alert('WebGL非対応ブラウザです。Chrome/Firefox/Edgeをご利用ください。');

// Shaders
const VS = `
  attribute vec2 aPos;
  attribute vec2 aUV;
  uniform vec2 uRes;
  varying vec2 vUV;
  void main(){
    vec2 ndc = aPos / uRes * 2.0 - 1.0;
    gl_Position = vec4(ndc.x, -ndc.y, 0.0, 1.0);
    vUV = aUV;
  }
`;
const FS = `
  precision mediump float;
  uniform sampler2D uTex;
  varying vec2 vUV;
  void main(){ gl_FragColor = texture2D(uTex, vUV); }
`;

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compileShader(VS, gl.VERTEX_SHADER));
gl.attachShader(prog, compileShader(FS, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
gl.useProgram(prog);

const aPos = gl.getAttribLocation(prog, 'aPos');
const aUV  = gl.getAttribLocation(prog, 'aUV');
const uRes = gl.getUniformLocation(prog, 'uRes');
const uTex = gl.getUniformLocation(prog, 'uTex');

const posBuf = gl.createBuffer();
const uvBuf  = gl.createBuffer();
const idxBuf = gl.createBuffer();
let texture = null;
let numIdx = 0;

// ====================================================
// STATE
// ====================================================
let img = null;
let gridSize = 10;
let gridW = 0, gridH = 0;  // number of CELLS
let vertW = 0, vertH = 0;  // = gridW+1, gridH+1

// Cell state (for painting UI)
let cellActive = [];  // bool[]
let cellFixed  = [];  // bool[]

// Vertex springs (mesh nodes)
let springs = [];  // VertexSpring[]

// Oscillation
let oscMode = 'manual';
let oscType = 'random';
let oscTime = 0;

// Background color (rgb 0-1)
let bgR = 22/255, bgG = 22/255, bgB = 30/255;

// Zoom/Pan
let viewZoom = 1, viewPanX = 0, viewPanY = 0;
let isPanning = false, panStart = {};
let altKeyDown = false;

// Paint
let paintMode = 'activate';
let isPainting = false;
let paintErase = false;
let lastTime = 0;

// Recording
let recording = false;
let mediaRecorder = null;
let exportRenderInt = null;
const exportCanvas = document.createElement('canvas');
const exportCtx = exportCanvas.getContext('2d');

// ====================================================
// VERTEX SPRING
// ====================================================
class VertexSpring {
  constructor(k, mass, damp) {
    this.dx = 0; this.dy = 0; this.vx = 0; this.vy = 0;
    this.active = false;
    this.k = k; this.mass = mass; this.damp = damp;
    this.phase = Math.random() * Math.PI * 2;
    this.oscAngle = Math.random() * Math.PI * 2;
  }
  impulse(str) {
    if (!this.active) return;
    const a = Math.random() * Math.PI * 2;
    this.vx += Math.cos(a) * str;
    this.vy += Math.sin(a) * str;
  }
  impulseDir(fx, fy) {
    if (!this.active) return;
    this.vx += fx; this.vy += fy;
  }
  update(dt, fxExt, fyExt) {
    if (!this.active) return;
    const ax = (-this.k * this.dx - this.damp * this.vx + fxExt) / this.mass;
    const ay = (-this.k * this.dy - this.damp * this.vy + fyExt) / this.mass;
    this.vx += ax * dt; this.vy += ay * dt;
    this.dx += this.vx * dt; this.dy += this.vy * dt;
    const cap = gridSize * 6;
    this.dx = Math.max(-cap, Math.min(cap, this.dx));
    this.dy = Math.max(-cap, Math.min(cap, this.dy));
  }
  reset() { this.dx = this.dy = this.vx = this.vy = 0; }
  get energy() { return Math.abs(this.vx)+Math.abs(this.vy)+Math.abs(this.dx)+Math.abs(this.dy); }
}

// ====================================================
// GRID INIT
// ====================================================
function initGrid() {
  if (!img) return;
  const k    = +document.getElementById('globalK').value;
  const mass = +document.getElementById('globalM').value;
  const damp = +document.getElementById('globalDamp').value;

  gridW = Math.ceil(img.width  / gridSize);
  gridH = Math.ceil(img.height / gridSize);
  vertW = gridW + 1;
  vertH = gridH + 1;

  cellActive = new Array(gridW * gridH).fill(false);
  cellFixed  = new Array(gridW * gridH).fill(false);
  springs    = Array.from({length: vertW * vertH}, () => new VertexSpring(k, mass, damp));

  buildStaticBuffers();
  updateGridInfo();
}

function buildStaticBuffers() {
  // ---- UV buffer (static, vertex canonical UV) ----
  const uvData = new Float32Array(vertW * vertH * 2);
  for (let vy = 0; vy < vertH; vy++) {
    for (let vx = 0; vx < vertW; vx++) {
      const i = (vy * vertW + vx) * 2;
      uvData[i]   = Math.min(vx * gridSize, img.width)  / img.width;
      uvData[i+1] = Math.min(vy * gridSize, img.height) / img.height;
    }
  }
  gl.bindBuffer(gl.ARRAY_BUFFER, uvBuf);
  gl.bufferData(gl.ARRAY_BUFFER, uvData, gl.STATIC_DRAW);

  // ---- Index buffer (static triangles) ----
  const nv = vertW * vertH;
  const UseUint32 = nv > 65535;
  const idxData = UseUint32 ? new Uint32Array(gridW * gridH * 6) : new Uint16Array(gridW * gridH * 6);
  let idx = 0;
  for (let cy = 0; cy < gridH; cy++) {
    for (let cx = 0; cx < gridW; cx++) {
      const tl = cy * vertW + cx;
      const tr = tl + 1;
      const bl = (cy + 1) * vertW + cx;
      const br = bl + 1;
      idxData[idx++] = tl; idxData[idx++] = tr; idxData[idx++] = bl;
      idxData[idx++] = tr; idxData[idx++] = br; idxData[idx++] = bl;
    }
  }
  numIdx = idx;
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, idxData, gl.STATIC_DRAW);
}

function getVertPos(vx, vy) {
  return Math.min(vx * gridSize, img.width);  // just for reference
}

// Sync vertex activation from cell state
function syncVertices() {
  for (let vy = 0; vy < vertH; vy++) {
    for (let vx = 0; vx < vertW; vx++) {
      const s = springs[vy * vertW + vx];
      // Vertex is active if ANY adjacent cell is active
      let anyActive = false, anyFixed = false;
      for (const [ddx, ddy] of [[-1,-1],[0,-1],[-1,0],[0,0]]) {
        const cx = vx + ddx, cy = vy + ddy;
        if (cx < 0 || cy < 0 || cx >= gridW || cy >= gridH) continue;
        const i = cy * gridW + cx;
        if (cellActive[i]) { anyActive = true; if (cellFixed[i]) anyFixed = true; }
      }
      const wasActive = s.active;
      s.active = anyActive;
      if (!anyActive && wasActive) s.reset();
    }
  }
}

function updateGridInfo() {
  const total = gridW * gridH;
  const active = cellActive.filter(Boolean).length;
  document.getElementById('cellInfo').textContent = `${gridW}×${gridH} = ${total}セル`;
  document.getElementById('activeCount').textContent = `${active} 有効`;
}

// IMAGE LOAD
// ====================================================
function loadImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  const i = new Image();
  i.onload = () => {
    img = i;
    canvas.width  = i.width;
    canvas.height = i.height;
    overlay.width  = i.width;
    overlay.height = i.height;
    gl.viewport(0, 0, i.width, i.height);

    // Upload texture
    if (texture) gl.deleteTexture(texture);
    texture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

    document.getElementById('dropHint').style.display = 'none';
    document.getElementById('statusInfo').textContent = `${i.width}×${i.height}`;
    setStatus(`✅ ${i.width}×${i.height}px`);
    URL.revokeObjectURL(url);

    initGrid();
    setTimeout(fitToScreen, 30);
    updateExportSizePreview();
  };
  i.src = url;
}

document.getElementById('fileInput').onchange = e => loadImageFile(e.target.files[0]);

// ====================================================
// RENDER (WebGL mesh + 2D overlay)
// ====================================================
function buildPosBuffer() {
  const posData = new Float32Array(vertW * vertH * 2);
  for (let vy = 0; vy < vertH; vy++) {
    for (let vx = 0; vx < vertW; vx++) {
      const s = springs[vy * vertW + vx];
      const px = Math.min(vx * gridSize, img.width);
      const py = Math.min(vy * gridSize, img.height);
      const i = (vy * vertW + vx) * 2;
      posData[i]   = px + (s.active ? s.dx : 0);
      posData[i+1] = py + (s.active ? s.dy : 0);
    }
  }
  return posData;
}

function render() {
  if (!img || !gl) return;

  // Background clear
  gl.clearColor(bgR, bgG, bgB, 1.0);
  gl.clear(gl.COLOR_BUFFER_BIT);

  // Bind texture
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.uniform1i(uTex, 0);
  gl.uniform2f(uRes, img.width, img.height);

  // Upload positions
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, buildPosBuffer(), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  // UV
  gl.bindBuffer(gl.ARRAY_BUFFER, uvBuf);
  gl.enableVertexAttribArray(aUV);
  gl.vertexAttribPointer(aUV, 2, gl.FLOAT, false, 0, 0);

  // Index + draw
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuf);
  const nv = vertW * vertH;
  const idxType = nv > 65535 ? gl.UNSIGNED_INT : gl.UNSIGNED_SHORT;
  gl.drawElements(gl.TRIANGLES, numIdx, idxType, 0);

  // 2D overlay (grid lines + cell tint)
  if (!recording) renderOverlay();
}

function renderOverlay() {
  oc.clearRect(0, 0, overlay.width, overlay.height);

  // Active/fixed cell tints
  for (let cy = 0; cy < gridH; cy++) {
    for (let cx = 0; cx < gridW; cx++) {
      const i = cy * gridW + cx;
      if (!cellActive[i]) continue;
      // Center of this cell = average of 4 corner vertex positions
      let avgX = 0, avgY = 0;
      let cnt = 0;
      for (const [dvx, dvy] of [[0,0],[1,0],[0,1],[1,1]]) {
        const s = springs[(cy+dvy) * vertW + (cx+dvx)];
        const vpx = Math.min((cx+dvx)*gridSize, img.width);
        const vpy = Math.min((cy+dvy)*gridSize, img.height);
        avgX += vpx + (s.active ? s.dx : 0);
        avgY += vpy + (s.active ? s.dy : 0);
        cnt++;
      }
      avgX /= cnt; avgY /= cnt;
      // Draw tint at cell original position (simpler)
      const ox = cx * gridSize, oy = cy * gridSize;
      const cw = Math.min(gridSize, img.width  - ox);
      const ch = Math.min(gridSize, img.height - oy);
      oc.fillStyle = cellFixed[i]
        ? 'rgba(249,226,175,0.35)'
        : 'rgba(137,180,250,0.22)';
      oc.fillRect(ox, oy, cw, ch);
    }
  }

  // Grid lines
  oc.strokeStyle = 'rgba(255,255,255,0.07)';
  oc.lineWidth = 0.5;
  oc.beginPath();
  for (let cx = 0; cx <= gridW; cx++) {
    oc.moveTo(cx*gridSize, 0); oc.lineTo(cx*gridSize, overlay.height);
  }
  for (let cy = 0; cy <= gridH; cy++) {
    oc.moveTo(0, cy*gridSize); oc.lineTo(overlay.width, cy*gridSize);
  }
  oc.stroke();
}

// ====================================================
// ANIMATION LOOP
// ====================================================
function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (!img) return;

  oscTime += dt;
  const str  = +document.getElementById('shakeStr').value;
  const freq = +document.getElementById('oscFreq').value;
  const omega = 2 * Math.PI * freq;

  for (const s of springs) {
    if (!s.active) continue;
    let fx = 0, fy = 0;
    if (oscMode === 'auto') {
      const A = str * s.k * 0.3;
      switch (oscType) {
        case 'vertical':   fy = A * Math.sin(omega * oscTime); break;
        case 'horizontal': fx = A * Math.sin(omega * oscTime); break;
        case 'circular':
          fx = A * Math.sin(omega * oscTime);
          fy = A * Math.cos(omega * oscTime); break;
        case 'random':
          const f = A * Math.sin(omega * oscTime + s.phase);
          fx = f * Math.cos(s.oscAngle);
          fy = f * Math.sin(s.oscAngle); break;
      }
    }
    s.update(dt, fx, fy);
  }

  render();
  if (img) updateGridInfo();
}
requestAnimationFrame(ts => { lastTime = ts; animate(ts); });

// ====================================================
// SHAKE
// ====================================================
function shakeAll() {
  if (!img) return;
  const str = +document.getElementById('shakeStr').value;
  for (const s of springs) s.impulse(str);
}
function resetAll() { for (const s of springs) s.reset(); }

// ====================================================
// CELL PAINTING
// ====================================================
function setPaintMode(mode) {
  paintMode = mode;
  ['activate','erase','fixed'].forEach(m => {
    const cap = m.charAt(0).toUpperCase() + m.slice(1);
    document.getElementById('mode' + cap).className = 'mode-btn' + (m === mode ? ` active-${m}` : '');
    const h = document.getElementById('hdr' + cap);
    if (h) h.classList.toggle('active', m === mode);
  });
}

function paintAt(px, py, forceErase) {
  if (!img) return;
  const brush = +document.getElementById('brushSize').value;
  const cx0 = Math.floor(px / gridSize);
  const cy0 = Math.floor(py / gridSize);
  const half = Math.floor(brush / 2);
  const k    = +document.getElementById('globalK').value;
  const mass = +document.getElementById('globalM').value;
  const damp = +document.getElementById('globalDamp').value;
  let changed = false;

  for (let dy = -half; dy <= half; dy++) {
    for (let dx = -half; dx <= half; dx++) {
      const cx = cx0+dx, cy = cy0+dy;
      if (cx < 0 || cy < 0 || cx >= gridW || cy >= gridH) continue;
      const i = cy * gridW + cx;
      if (forceErase) {
        cellActive[i] = false; cellFixed[i] = false;
      } else {
        switch (paintMode) {
          case 'activate':
            cellActive[i] = true; cellFixed[i] = false;
            // Apply physics to this cell's vertices
            for (const [dvx, dvy] of [[0,0],[1,0],[0,1],[1,1]]) {
              const s = springs[(cy+dvy)*vertW+(cx+dvx)];
              s.k = k; s.mass = mass; s.damp = damp;
            }
            break;
          case 'erase':
            cellActive[i] = false; cellFixed[i] = false; break;
          case 'fixed':
            cellActive[i] = true; cellFixed[i] = true; break;
        }
      }
      changed = true;
    }
  }
  if (changed) syncVertices();
}

function selectAll() {
  if (!img) return;
  const k=+document.getElementById('globalK').value, mass=+document.getElementById('globalM').value, damp=+document.getElementById('globalDamp').value;
  cellActive.fill(true); cellFixed.fill(false);
  for (const s of springs) { s.k=k; s.mass=mass; s.damp=damp; }
  syncVertices();
}
function clearAll() {
  cellActive.fill(false); cellFixed.fill(false);
  syncVertices();
  for (const s of springs) s.reset();
}
function invertAll() {
  const k=+document.getElementById('globalK').value, mass=+document.getElementById('globalM').value, damp=+document.getElementById('globalDamp').value;
  for (let i=0;i<cellActive.length;i++) {
    cellActive[i] = !cellActive[i];
    if (!cellActive[i]) cellFixed[i] = false;
    else for (const [dvx,dvy] of [[0,0],[1,0],[0,1],[1,1]]) {
      const cx=i%gridW, cy=Math.floor(i/gridW);
      const s=springs[(cy+dvy)*vertW+(cx+dvx)];
      s.k=k; s.mass=mass; s.damp=damp;
    }
  }
  syncVertices();
}
function applyParamsToAll() {
  const k=+document.getElementById('globalK').value, mass=+document.getElementById('globalM').value, damp=+document.getElementById('globalDamp').value;
  for (const s of springs) { if(s.active){s.k=k;s.mass=mass;s.damp=damp;} }
  setStatus('全アクティブ頂点に物理値を適用しました');
}

// ====================================================
// CANVAS MOUSE
// ====================================================
function canvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX-r.left)*(canvas.width/r.width), y: (e.clientY-r.top)*(canvas.height/r.height) };
}

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('mousedown', e => {
  if (!img || isPanning || e.altKey) return;
  if (e.button === 0) {
    isPainting = true; paintErase = false;
    const p = canvasPos(e);
    if (e.ctrlKey) {
      const prev = paintMode; paintMode = 'fixed';
      paintAt(p.x, p.y, false);
      paintMode = prev;
    } else {
      paintAt(p.x, p.y, false);
    }
  } else if (e.button === 2) {
    isPainting = true; paintErase = true;
    const p = canvasPos(e);
    paintAt(p.x, p.y, true);
  }
});
canvas.addEventListener('mousemove', e => {
  if (!img || !isPainting || isPanning || e.altKey) return;
  const p = canvasPos(e);
  if (e.ctrlKey) {
    const prev = paintMode; paintMode = 'fixed';
    paintAt(p.x, p.y, false);
    paintMode = prev;
  } else {
    paintAt(p.x, p.y, paintErase);
  }
});
canvas.addEventListener('mouseup', () => { isPainting = false; paintErase = false; });
canvas.addEventListener('mouseleave', () => { isPainting = false; paintErase = false; });
canvas.addEventListener('click', e => {
  if (!img || isPanning || e.altKey) return;
  if (oscMode === 'manual') shakeAll();
});

// ====================================================
// ZOOM / PAN
// ====================================================
function applyViewTransform() {
  canvasInner.style.transform = `translate(${viewPanX}px,${viewPanY}px) scale(${viewZoom})`;
  const pct = `${Math.round(viewZoom*100)}%`;
  document.getElementById('zoomLabel').textContent = pct;
  document.getElementById('statusZoom').textContent = `Zoom: ${pct}`;
}
function zoomAt(cx, cy, f) {
  const r = wrap.getBoundingClientRect();
  const x=cx-r.left, y=cy-r.top, old=viewZoom;
  viewZoom = Math.max(0.05, Math.min(16, viewZoom*f));
  viewPanX = x-(x-viewPanX)*(viewZoom/old);
  viewPanY = y-(y-viewPanY)*(viewZoom/old);
  applyViewTransform();
}
function zoomStep(f) { const r=wrap.getBoundingClientRect(); zoomAt(r.left+r.width/2,r.top+r.height/2,f); }
function fitToScreen() {
  if (!img) { applyViewTransform(); return; }
  const ww=wrap.clientWidth, wh=wrap.clientHeight;
  viewZoom = Math.min((ww-40)/img.width,(wh-40)/img.height,1);
  viewPanX = (ww-img.width*viewZoom)/2;
  viewPanY = (wh-img.height*viewZoom)/2;
  applyViewTransform();
}
function resetView() {
  if (!img) { viewZoom=1;viewPanX=0;viewPanY=0;applyViewTransform();return; }
  viewZoom=1;
  viewPanX=(wrap.clientWidth-img.width)/2;
  viewPanY=(wrap.clientHeight-img.height)/2;
  applyViewTransform();
}

wrap.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.clientX,e.clientY,e.deltaY<0?1.15:1/1.15);},{passive:false});
wrap.addEventListener('mousedown',e=>{
  if(e.button===1||(e.button===0&&e.altKey)){
    e.preventDefault();e.stopPropagation();
    isPanning=true;panStart={mx:e.clientX,my:e.clientY,px:viewPanX,py:viewPanY};
    wrap.classList.add('panning');
  }
},true);
document.addEventListener('mousemove',e=>{
  if(isPanning){viewPanX=panStart.px+(e.clientX-panStart.mx);viewPanY=panStart.py+(e.clientY-panStart.my);applyViewTransform();}
  if(altKeyDown&&!isPanning)wrap.classList.add('pan-ready');
});
document.addEventListener('mouseup',e=>{
  if(isPanning){isPanning=false;wrap.classList.remove('panning');if(!altKeyDown)wrap.classList.remove('pan-ready');}
});
document.addEventListener('keydown',e=>{if(e.altKey&&!altKeyDown){altKeyDown=true;if(!isPanning)wrap.classList.add('pan-ready');}});
document.addEventListener('keyup',e=>{if(!e.altKey){altKeyDown=false;wrap.classList.remove('pan-ready');}});

// ====================================================
// EXPORT SIZE
// ====================================================
function getExportSize() {
  if (!img) return {w:0,h:0};
  const p = document.getElementById('exportPreset').value;
  if (p==='original') return {w:canvas.width,h:canvas.height};
  if (p==='half')    return {w:Math.max(1,Math.round(canvas.width/2)),h:Math.max(1,Math.round(canvas.height/2))};
  if (p==='quarter') return {w:Math.max(1,Math.round(canvas.width/4)),h:Math.max(1,Math.round(canvas.height/4))};
  return {w:Math.max(1,parseInt(document.getElementById('exportW').value)||canvas.width),
          h:Math.max(1,parseInt(document.getElementById('exportH').value)||canvas.height)};
}
function onExportPresetChange() {
  document.getElementById('customSizeArea').style.display = document.getElementById('exportPreset').value==='custom'?'':'none';
  updateExportSizePreview();
}
function updateExportSizePreview() {
  if (!img) { document.getElementById('exportSizePreview').textContent='出力: —'; return; }
  const {w,h} = getExportSize();
  document.getElementById('exportSizePreview').textContent=`出力: ${w} × ${h} px`;
}
function getExportFrame() {
  const {w,h} = getExportSize();
  exportCanvas.width=w; exportCanvas.height=h;
  exportCtx.drawImage(canvas,0,0,w,h); // WebGL canvas → 2D canvas
  return exportCanvas;
}

// ====================================================
// GIF RECORDING
// ====================================================
function recordGif() {
  if (!img){alert('画像を読み込んでください');return;}
  if (recording) return;
  if (typeof GIF==='undefined'){alert('GIFライブラリ読み込み失敗。WebMをお試しください。');return;}
  const dur=parseInt(document.getElementById('recDur').value)*1000;
  const fps=parseInt(document.getElementById('gifFps').value);
  const quality=parseInt(document.getElementById('gifQuality').value);
  const delay=Math.round(1000/fps);
  const {w,h}=getExportSize();
  const gif=new GIF({workers:2,quality,width:w,height:h,
    workerScript:GIF._workerURL});
  recording=true;
  setStatus('🔴 GIF録画中...',true);
  document.getElementById('recBadge').classList.add('visible');
  document.getElementById('btnRecGif').disabled=true;
  document.getElementById('btnRecWebm').disabled=true;
  shakeAll();
  let elapsed=0;
  const capture=()=>{
    if(elapsed>=dur){
      recording=false;
      document.getElementById('recBadge').classList.remove('visible');
      setStatus('⏳ GIFエンコード中...');
      document.getElementById('exportProgress').style.display='';
      gif.on('finished',blob=>{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=`xx-cake-${Date.now()}.gif`;a.click();
        URL.revokeObjectURL(url);
        document.getElementById('exportProgress').style.display='none';
        document.getElementById('btnRecGif').disabled=false;
        document.getElementById('btnRecWebm').disabled=false;
        setStatus(`✅ GIF完了 (${(blob.size/1024).toFixed(0)}KB) ${w}×${h}`);
      });
      gif.render();return;
    }
    gif.addFrame(getExportFrame(),{copy:true,delay});
    elapsed+=delay;
    if(elapsed>0&&elapsed%1200<delay)shakeAll();
    setTimeout(capture,delay);
  };
  setTimeout(capture,80);
}

// ====================================================
// WebM RECORDING
// ====================================================
function recordWebM() {
  if (!img){alert('画像を読み込んでください');return;}
  if (recording) return;
  if (!canvas.captureStream){alert('このブラウザはWebM録画に対応していません');return;}
  const dur=parseInt(document.getElementById('recDur').value)*1000;
  const {w,h}=getExportSize();
  exportCanvas.width=w; exportCanvas.height=h;
  exportRenderInt=setInterval(()=>{exportCtx.drawImage(canvas,0,0,w,h);},1000/30);
  const stream=exportCanvas.captureStream(30);
  const chunks=[];
  const mime=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
    .find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
  mediaRecorder=new MediaRecorder(stream,{mimeType:mime});
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  mediaRecorder.onstop=()=>{
    clearInterval(exportRenderInt);stream.getTracks().forEach(t=>t.stop());
    const blob=new Blob(chunks,{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`xx-cake-${Date.now()}.webm`;a.click();
    URL.revokeObjectURL(url);
    recording=false;
    document.getElementById('recBadge').classList.remove('visible');
    document.getElementById('btnRecGif').disabled=false;
    document.getElementById('btnRecWebm').disabled=false;
    setStatus(`✅ WebM完了 (${(blob.size/1024).toFixed(0)}KB) ${w}×${h}`);
  };
  recording=true;
  setStatus('🔴 WebM録画中...',true);
  document.getElementById('recBadge').classList.add('visible');
  document.getElementById('btnRecGif').disabled=true;
  document.getElementById('btnRecWebm').disabled=true;
  mediaRecorder.start(100);
  shakeAll();
  setTimeout(()=>{if(recording)shakeAll();},dur*0.4);
  setTimeout(()=>{if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();},dur);
}

// ====================================================
// STATUS / KEYBOARD

function setStatus(msg,rec=false) {
  document.getElementById('statusText').textContent=msg;
  document.getElementById('statusDot').className='status-dot'+(rec?' recording':'');
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.code==='Space'){e.preventDefault();shakeAll();}
  if(e.code==='KeyR')resetAll();
  if(e.code==='Delete'||e.code==='Backspace')clearAll();
  if(e.code==='KeyF')fitToScreen();
  if(e.code==='Digit0'||e.code==='Numpad0')resetView();
  if(e.code==='Digit1')setPaintMode('activate');
  if(e.code==='Digit2')setPaintMode('erase');
  if(e.code==='Digit3')setPaintMode('fixed');
  if((e.ctrlKey||e.metaKey)&&e.code==='Equal'){e.preventDefault();zoomStep(1.2);}
  if((e.ctrlKey||e.metaKey)&&e.code==='Minus'){e.preventDefault();zoomStep(1/1.2);}
});

// ====================================================
// INIT
// ====================================================
setPaintMode('activate');
setOscMode('manual');
setOscType('random');
applyViewTransform();
setStatus('画像を読み込んでください');
</script>
</body>
</html>
